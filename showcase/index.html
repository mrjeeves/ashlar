<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ashlar — examples</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #262b36;
    --ink: #e6e9ef;
    --muted: #8b93a7;
    --accent: #5b8cff;
    --accent-ink: #fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  /* --- sidebar --- */
  .side {
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 20px 14px 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .brand { padding: 6px 10px 4px; }
  .wordmark {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #7aa2ff, #b18cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline { margin: 2px 0 0; font-size: 13px; color: var(--muted); }
  .group {
    margin: 16px 10px 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
  }
  .item {
    display: block;
    width: 100%;
    text-align: left;
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink);
    padding: 9px 11px;
    border-radius: 10px;
    cursor: pointer;
    font: inherit;
  }
  .item:hover { background: var(--panel-2); }
  .item.active { background: var(--accent); border-color: transparent; color: var(--accent-ink); }
  .item .name { font-weight: 600; }
  .item .blurb { font-size: 12.5px; color: var(--muted); margin-top: 1px; }
  .item.active .blurb { color: rgba(255, 255, 255, 0.8); }

  /* --- main --- */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .bar h1 { margin: 0; font-size: 16px; font-weight: 650; }
  .cmd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--line);
    padding: 4px 9px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .spacer { flex: 1; }
  .open {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    border: 1px solid var(--line);
    padding: 5px 11px;
    border-radius: 8px;
  }
  .open:hover { color: var(--ink); border-color: var(--accent); }
  .hint { font-size: 12.5px; color: var(--muted); }
  .hint code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
  }
  .frame-wrap { position: relative; flex: 1; min-height: 0; background: var(--bg); }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #fff; }

  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .side { flex-direction: row; flex-wrap: wrap; height: auto; max-height: 42vh; }
  }
</style>
</head>
<body>
  <nav class="side" id="side">
    <div class="brand">
      <div class="wordmark">ashlar</div>
      <p class="tagline">fourteen examples, live</p>
    </div>
  </nav>

  <div class="main">
    <div class="bar">
      <h1 id="title">counter</h1>
      <span class="cmd" id="cmd">ashlar run examples/counter</span>
      <span class="spacer"></span>
      <span class="hint">not loading? run <code>./showcase/serve.sh</code></span>
      <a class="open" id="open" href="#" target="_blank" rel="noopener">open ↗</a>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" title="example" src="about:blank"></iframe>
    </div>
  </div>

<script>
// name:port mirrors showcase/serve.sh. Keep the two in sync.
var GROUPS = [
  { label: "Views & forms", items: [
    { name: "counter", port: 8081, blurb: "Server-side state, live over a socket" },
    { name: "todo", port: 8082, blurb: "A live form; items commit over the socket" },
    { name: "chat", port: 8083, blurb: "Composition across four files; a live feed" },
  ]},
  { label: "Realtime", items: [
    { name: "poll", port: 8084, blurb: "A channel carries the ephemeral event" },
    { name: "ticker", port: 8085, blurb: "A schedule drives reactive re-renders" },
    { name: "pong", port: 8086, blurb: "A 20fps game with zero client code" },
    { name: "foundry", port: 8087, blurb: "Background work patched into a live board" },
  ]},
  { label: "Composition", items: [
    { name: "press", port: 8088, blurb: "A layered pipe, previewed live" },
    { name: "guardrails", port: 8089, blurb: "A typed policy pipe decides live" },
  ]},
  { label: "Auth & data", items: [
    { name: "diary", port: 8090, blurb: "Sessions and an allow-guarded page" },
    { name: "locker", port: 8091, blurb: "Per-user owned storage, isolated" },
    { name: "ledger", port: 8092, blurb: "A real SQLite datastore over foreign" },
  ]},
  { label: "Flagship", items: [
    { name: "commons", port: 8093, blurb: "A full team chat — the whole language" },
  ]},
  { label: "Minimal", items: [
    { name: "hello", port: 8094, blurb: "The smallest server: two parts" },
  ]},
];

var side = document.getElementById("side");
var frame = document.getElementById("frame");
var title = document.getElementById("title");
var cmd = document.getElementById("cmd");
var open = document.getElementById("open");
var flat = [];
var buttons = [];

GROUPS.forEach(function (g) {
  var h = document.createElement("div");
  h.className = "group";
  h.textContent = g.label;
  side.appendChild(h);
  g.items.forEach(function (ex) {
    var b = document.createElement("button");
    b.className = "item";
    b.innerHTML = '<div class="name"></div><div class="blurb"></div>';
    b.querySelector(".name").textContent = ex.name;
    b.querySelector(".blurb").textContent = ex.blurb;
    var idx = flat.length;
    b.addEventListener("click", function () { select(idx); });
    side.appendChild(b);
    flat.push(ex);
    buttons.push(b);
  });
});

function select(i) {
  var ex = flat[i];
  buttons.forEach(function (b, j) { b.classList.toggle("active", i === j); });
  var url = "http://127.0.0.1:" + ex.port + "/";
  frame.src = url;
  title.textContent = ex.name;
  cmd.textContent = "ashlar run examples/" + ex.name;
  open.href = url;
  current = i;
}

var current = 0;
select(0);

// Arrow keys / j-k swap between examples for quick review.
document.addEventListener("keydown", function (e) {
  if (e.target && e.target.tagName === "IFRAME") return;
  if (e.key === "ArrowDown" || e.key === "j") { select((current + 1) % flat.length); e.preventDefault(); }
  else if (e.key === "ArrowUp" || e.key === "k") { select((current - 1 + flat.length) % flat.length); e.preventDefault(); }
});
</script>
</body>
</html>
